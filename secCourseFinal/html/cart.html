<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <title>კალათა - Kronos Shawarma</title>
    <style>
      /* Quick dedicated styles for the cart layout */
      .cart-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
      }
      .cart-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #ddd;
        padding: 15px 0;
      }
      .cart-item img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 6px;
      }
      .cart-details {
        flex: 1;
        margin-left: 20px;
      }
      .quantity-controls button {
        padding: 5px 10px;
        cursor: pointer;
        background-color: yellow;
        border: none;
        font-weight: bold;
        border-radius: 4px;
      }
      .quantity-controls span {
        margin: 0 10px;
        font-weight: bold;
      }
      .remove-btn {
        background-color: #ff4d4d;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
        margin-left: 15px;
      }
      .cart-total {
        text-align: right;
        margin-top: 20px;
        font-size: 1.3rem;
        font-weight: bold;
      }
      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        text-decoration: none;
        color: black;
        background: #eee;
        padding: 10px 15px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="cart-container">
      <a href="index.html" class="back-btn">← მენიუში დაბრუნება</a>
      <h2>თქვენი კალათა</h2>

      <div id="cart-items-container"></div>

      <div class="cart-total">
        სულ გადასახდელია: <span id="total-price">0</span> ₾
      </div>
    </div>

    <script src="../js/cart.js"></script>
  </body>
</html>
